# Terraform State バックエンド設定（preview 環境）
# 事前に S3 バケットと DynamoDB テーブルを手動作成してください
# 詳細: docs/how-to/terraform-guide.md

bucket         = "your-tfstate-bucket"   # 変更必須: State 保存用 S3 バケット名
key            = "preview.tfstate"
region         = "ap-northeast-1"
encrypt        = true
dynamodb_table = "terraform-state-lock"  # 変更必須: ロック用 DynamoDB テーブル名
